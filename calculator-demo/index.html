<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinzCo™ — Premium Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="calc-wrapper">
    <header class="calc-header">
      <span class="logo">Finz<span class="logo-accent">Co</span>™</span>
      <span class="badge">FREE TIER</span>
    </header>

    <div class="calculator">
      <div class="display">
        <div class="expression" id="expression">&nbsp;</div>
        <div class="current-value" id="current-value">0</div>
      </div>

      <div class="btn-grid">
        <!-- Row 1 -->
        <button class="btn btn-fn" data-action="clear"    aria-label="Clear">AC</button>
        <button class="btn btn-fn" data-action="sign"     aria-label="Toggle sign">+/−</button>
        <button class="btn btn-fn" data-action="percent"  aria-label="Percent">%</button>
        <button class="btn btn-op" data-action="operator" data-value="/" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="digit" data-value="7">7</button>
        <button class="btn btn-num" data-action="digit" data-value="8">8</button>
        <button class="btn btn-num" data-action="digit" data-value="9">9</button>
        <button class="btn btn-op" data-action="operator" data-value="*" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="digit" data-value="4">4</button>
        <button class="btn btn-num" data-action="digit" data-value="5">5</button>
        <button class="btn btn-num" data-action="digit" data-value="6">6</button>
        <button class="btn btn-op" data-action="operator" data-value="-" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="digit" data-value="1">1</button>
        <button class="btn btn-num" data-action="digit" data-value="2">2</button>
        <button class="btn btn-num" data-action="digit" data-value="3">3</button>
        <button class="btn btn-op" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num btn-zero" data-action="digit" data-value="0">0</button>
        <button class="btn btn-num" data-action="decimal" aria-label="Decimal">.</button>
        <button class="btn btn-num" data-action="backspace" aria-label="Backspace">⌫</button>
        <button class="btn btn-eq" data-action="equals" aria-label="Equals">=</button>
      </div>
    </div>

    <footer class="calc-footer">
      <span>© 2026 FinzCo™ Inc. &nbsp;·&nbsp; All math reserved.</span>
    </footer>
  </main>

  <!-- ══════════ UPGRADE MODAL ══════════ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <div class="modal-icon">🔒</div>
      <h2 class="modal-title" id="modal-title">Choose your calculator plan</h2>
      <p class="modal-subtitle">This calculation requires an active subscription.</p>

      <div class="plans">
        <button class="plan-card" data-plan="Free-Ali">
          <div class="plan-name">Free-Ali</div>
          <div class="plan-desc">Basic arithmetic, limited confidence</div>
          <div class="plan-cta">Upgrade to Free-Ali</div>
        </button>

        <button class="plan-card plan-popular" data-plan="Pro-Ali">
          <div class="plan-badge">MOST POPULAR</div>
          <div class="plan-name">Pro-Ali</div>
          <div class="plan-desc">Faster calculations, same wrong answers</div>
          <div class="plan-cta">Upgrade to Pro-Ali</div>
        </button>

        <button class="plan-card plan-luxury" data-plan="Dubai-Pro-Ali">
          <div class="plan-name">Dubai-Pro-Ali ✦</div>
          <div class="plan-desc">Premium numbers, gold-plated equals button</div>
          <div class="plan-cta">Upgrade to Dubai-Pro-Ali</div>
        </button>
      </div>

      <button class="btn-maybe" id="btn-maybe">Maybe later</button>

      <!-- QR payment screen (hidden by default) -->
      <div class="qr-screen" id="qr-screen" hidden>
        <div class="qr-header">
          <div class="qr-logo">FinzCo</div>
          <h3 class="qr-title">FinzCo QR Payment</h3>
          <p class="qr-subtitle">Scan the QR code to activate your calculator plan</p>
          <div class="qr-plan-badge" id="qr-plan-name"></div>
        </div>
        <div class="qr-code-wrap">
          <div id="qr-svg-container"></div>
          <a class="qr-link" href="https://www.linkedin.com/company/finzco/" target="_blank" rel="noopener noreferrer">
            linkedin.com/company/finzco
          </a>
        </div>
        <div class="qr-status" id="qr-status" hidden>
          Payment not found. But we trust you.
        </div>
        <div class="qr-buttons">
          <button class="btn-paid" id="btn-paid">I have paid</button>
          <button class="btn-qr-cancel" id="btn-qr-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
